# nginx reverse-proxy in front of the Fastify backend.
#
# Drop this file under /etc/nginx/sites-available/wol-lobby.conf
# and symlink to /etc/nginx/sites-enabled/. After editing, test +
# reload:
#   sudo nginx -t && sudo systemctl reload nginx
#
# The server_name placeholder MUST be replaced with the actual
# subdomain you registered (DuckDNS, Cloudflare, whatever). Let's
# Encrypt's HTTP-01 challenge needs that name to resolve to this
# VM's public IP so certbot can mint the cert.

# ---- HTTP: redirect to HTTPS + serve ACME challenges ----------
server {
    listen 80;
    listen [::]:80;
    server_name CHANGE-ME.duckdns.org;

    # Let's Encrypt webroot challenge — keep this above any blanket
    # redirect so certbot's renewal cron can find its tokens.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS: reverse proxy to Fastify on 127.0.0.1:8080 --------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name CHANGE-ME.duckdns.org;

    # Filled in by certbot during the first issue. Don't edit by hand;
    # `sudo certbot --nginx -d CHANGE-ME.duckdns.org` writes these
    # exact lines for you.
    ssl_certificate     /etc/letsencrypt/live/CHANGE-ME.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/CHANGE-ME.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 6 MB cap on uploads — covers the 5 MB replay payload plus a
    # little slack for headers. nginx default is 1 MB which would
    # 413 every replay upload silently.
    client_max_body_size 6m;

    # WebSocket upgrade headers are required for /lobbies/*/ws.
    # The map below sets the right Connection header depending on
    # whether the request asked to upgrade.
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-running WebSocket connections — bump the read timeout
        # well above the launcher's 30-second ping cadence so an
        # idle lobby doesn't get torn down by nginx.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# Shared map (put this in /etc/nginx/conf.d/upgrade-map.conf if not
# already there — nginx ships with it on most distros, but if you
# get "unknown variable $connection_upgrade" copy this snippet there):
#
#   map $http_upgrade $connection_upgrade {
#       default upgrade;
#       ''      close;
#   }
